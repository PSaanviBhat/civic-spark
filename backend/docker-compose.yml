services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: civic_user
      POSTGRES_PASSWORD: civic_password
      POSTGRES_DB: civic_spark
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://civic_user:civic_password@db:5432/civic_spark
      SECRET_KEY: dev-secret-key
      DEBUG: "true"
      FRONTEND_URL: http://localhost:8080
    depends_on:
      - db
    command: python main.py

volumes:
  postgres_data:
